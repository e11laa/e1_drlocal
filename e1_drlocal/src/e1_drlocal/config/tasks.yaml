plan_research:
  description: >
    現在時刻: {current_time}
    テーマ: {topic}

    {feedback_section}

    あなたは優秀なリサーチプランナーです。まず、このトピックを多角的に解剖するための分析プロセスを
    <think> タグの中に記述してください。
    その深い思考に基づき、「6項目のリサーチ計画」を立ててください。

    --- 調査軸の指針 ---
    以下の6つの調査軸を必ずカバーするクエリを生成せよ。各軸から最低1つのクエリを含めること：
    1.【事実・経緯】何が起きたか（時系列・公式発表・報道）
    2.【原因・因果】なぜ起きたか（構造的要因・背景メカニズム）
    3.【定量データ】数値・統計・比較データ
    4.【ステークホルダー】関係者の反応・影響・立場
    5.【比較・対照】類似事例・対照事例・他国や他分野の状況
    6.【将来展望】今後の予測・専門家の見解・トレンド
    ---

    【重要: クエリのフォーマット】
    検索エンジン（SearxNG）に直接入力するキーワードの組み合わせとして出力せよ。
    自然言語の文章や疑問文ではなく、スペース区切りのキーワード列にすること。
    各クエリは15語以内のキーワード列にせよ。

    上記の調査軸を網羅する検索キーワードクエリを6つ生成せよ。
    各クエリは異なる調査軸をカバーし、重複しないようにすること。

    【出力フォーマット】
    <think>
    [ここにあなたの思考プロセスを記述]
    </think>
    RESEARCH_PLAN: [6項目の計画]
    QUERIES: [キーワードクエリ1], [キーワードクエリ2], [キーワードクエリ3], [キーワードクエリ4], [キーワードクエリ5], [キーワードクエリ6]
  expected_output: >
    RESEARCH_PLAN: を含む6項目のリサーチ計画と、
    QUERIES: を含む6つの検索キーワードクエリ（スペース区切りのキーワード列）
  agent: planner

research_topic:
  description: >
    リサーチ計画：
    {research_plan}

    検索クエリ：{query}

    上記のクエリで SearxNG 検索を実行し、検索結果の上位URLから Web ページをフェッチせよ。
    フェッチした各ページから、リサーチ計画に関連する重要な情報を抽出し要約せよ。

    【重要: 言語設定】
    - 情報の要約は、**情報の取得元（ソースWebサイト）の主要言語** で記述してください。
    - 日本語のサイトなら日本語で、英語のサイトなら英語のまま詳しく要約せよ。
    - 無理に日本語に翻訳しようとして情報を歪めたり、不自然なカタカナ語（ニュアンスの違う造語）を創作したりすることは、ハルシネーション（嘘）の原因となるため厳禁です。

    【重要: 検索ループの制限】
    - searxng_web_search ツールを用いて上記の検索クエリ({query})を「3回以下の回数のみ」実行してください。
    - 異なるキーワードで4回以上も検索を繰り返してはいけません。
    - 次に、検索結果の上位URLから最大2つを選んで、web_fetch ツールで内容を取得してください。
    - 取得できた情報の範囲で抽出内容をまとめ、必ず最終回答を出力してタスクを終了してください。

    出力には必ず以下を含めること：
    - [事実] 具体的な数値、日付、固有名詞（ソースの表記を保持）を含む事実
    - [分析] その事実が持つ意味や因果関係の解釈
    - [出典] 情報のソースURL（フェッチした URL をそのまま引用すること）

    フェッチに失敗した場合は、検索結果のスニペットから可能な限り情報を抽出せよ。
  expected_output: >
    リサーチ計画に関連する情報の要約レポート。
    各情報に[事実][分析][出典]のラベルが付いたもの。
  agent: researcher

review_research:
  description: >
    現在時刻: {current_time}
    テーマ: {topic}
    リサーチ計画：
    {research_plan}

    収集データ：
    {research_data}

    --- 調査軸の指針 ---
    以下の6つの調査軸を必ずカバーするクエリを生成せよ。各軸から最低1つのクエリを含めること：
    1.【事実・経緯】何が起きたか（時系列・公式発表・報道）
    2.【原因・因果】なぜ起きたか（構造的要因・背景メカニズム）
    3.【定量データ】数値・統計・比較データ
    4.【ステークホルダー】関係者の反応・影響・立場
    5.【比較・対照】類似事例・対照事例・他国や他分野の状況
    6.【将来展望】今後の予測・専門家の見解・トレンド
    ---

    上記の6つの調査軸に沿って、収集されたデータを厳格に評価せよ。
    以下のフォーマットで出力すること：

    VERDICT: PASS または FAIL
    COVERED_DIMENSIONS: [カバーされた調査軸の番号リスト]
    MISSING_DIMENSIONS: [不足している調査軸の番号と具体的な不足内容]
    FEEDBACK: [総合的なフィードバック]
    SUGGESTED_QUERIES: [不足を補うための検索キーワードクエリ（FAILの場合のみ）。
    必ず検索エンジン向けのスペース区切りキーワード列として出力すること。
    バッククォートで囲んで出力せよ。例: `hoge fuga 推移 2015 2024`]
  expected_output: >
    VERDICT: PASS/FAIL の判定と、
    COVERED_DIMENSIONS, MISSING_DIMENSIONS, FEEDBACK, SUGGESTED_QUERIES を含む評価結果
  agent: reviewer

create_outline:
  description: >
    テーマ: {topic}
    収集データ:
    {research_data}

    収集された情報の深さと広がりに基づき、読者が本質を理解できるレポートの章立てを作成せよ。

    【章立ての要件】
    - 序論（テーマの背景・本レポートの目的・分析の射程を提示）
    - 本論として4〜6つの章（各章は独立したテーマを持つ）
    - 結論（全体の知見を統合した高次の洞察）

    【章設計の原則】
    - 各章は独立したテーマを持ち、他の章とデータが重複しないこと
    - FOCUSには「〜の概要」のような曖昧な記述ではなく、具体的に論じるポイントを書くこと
    - 収集データの内容に基づいて章を設計すること（データが無い章を作らない）
    - テーマに最適な章構成を自由に設計してよい

    以下のフォーマットに厳密に従って出力せよ（CHAPTER: で各章を開始すること）：

    --- 出力フォーマット ---
    CHAPTER: [章タイトル]
    FOCUS: [この章で論じるポイント 2〜3個]
    RELEVANT_DATA: [この章で使う収集データの概要]

    CHAPTER: [次の章タイトル]
    FOCUS: ...
    RELEVANT_DATA: ...
    --- フォーマットここまで ---

    【重要】構成案を書く際、 Markdown の見出し記号（# や ##）は絶対に使用しないでください。章の区切りは「CHAPTER:」で行い、もし細かいセクションが必要なら「SECTION:」を使用すること。

    序論と結論を含め、合計6〜8個のCHAPTER: を出力せよ。
  expected_output: >
    CHAPTER: 形式で6〜8章の構成案。
    各章に FOCUS と RELEVANT_DATA を含む。
  agent: outliner

write_report:
  description: >
    テーマ: {topic}

    {write_instruction}

    {quality_requirements}
  expected_output: >
    Markdown形式の包括的な分析レポート。
    各章が ## 見出しで始まり、[Source: URL] 形式の引用を含む。
    最低5000文字以上。
  agent: writer

synthesize_data:
  description: >
    テーマ: {topic}

    【既存の調査コンテキスト】
    {existing_data}

    【新規取得データ】
    {new_data}

    上記の「既存の調査コンテキスト」と「新規取得データ」をマージしてください。
    
    【厳守するルール】
    1. 情報の重複を完全に排除してください。
    2. 数値データ（パーセント、金額、年、サイズなど）、固有名詞、出典URL `[Source: URL]` を一切消去してはいけません。
    3. LLMのエラーメッセージや無関係なノイズがあればそれらを削除してください。
    4. 見やすいMarkdownリスト、もしくは簡潔な段落に構造化して再構築してください。
    
    上記を満たした、高密度でクリーンな統合データのみを出力してください。挨拶や補足説明は不要です。
  expected_output: >
    重複が排除され、事実と出典URLが完全に保持された統合Markdownデータ。
  agent: synthesizer

edit_report:
  description: >
    テーマ: {topic}

    【Writerによって執筆された最終レポート案】
    ---
    {draft_report}
    ---

    あなたは鬼編集長として、上記のレポート案を非常に厳しく査読してください。
    
    【監査基準】
    1. 論理の飛躍や根拠なき推測（ハルシネーション）がないか？
    2. 調査トピックについての本質的な問いに答えているか？
    3. 語彙や文体がビジネス・学術プロフェッショナルとして相応しいか？
    4. 「～の概要について述べる」といった無駄なメタ発言やスカスカな箇条書きがないか？

    【出力要件】
    問題が一つでもあれば、最初の行に `VERDICT: FAIL` と書き、これに続けてどの部分をどう直すべきかの具体的な「修正指示（フィードバック）」を箇条書きで出力してください。
    完璧に基準を満たしており修正の余地がないと判断した場合のみ、最初の行に `VERDICT: PASS` とだけ出力して終了してください。
  expected_output: >
    最初の行に VERDICT: PASS または VERDICT: FAIL [フィードバックテキスト] が記載された査読結果。
  agent: editor
